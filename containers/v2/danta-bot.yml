services:
  codex-exec-stock-v2:
    container_name: codex-exec-stock-v2
    image: dokysp/codex-exec-v2:${CODEX_EXEC_V2_VERSION}
    environment:
      TELEGRAM_ROUTE: v2
    env_file:
      - ./codex-exec/config/codex-exec.env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8091:8080"
    volumes:
      - codex-home-stock-v2:/codex-home
      - codex-state-stock-v2:/state
      - ./codex-exec/config/schedules.yaml:/app/configs/schedules.yaml:ro
      - ./:/workspace

volumes:
  codex-home-stock-v2:
  codex-state-stock-v2:

networks:
  default:
    name: danta-bot-net
