services:
  codex-exec-v1:
    container_name: codex-exec-v1
    image: dokysp/codex-exec-v1:1.1.2
    environment:
      TELEGRAM_ROUTE: v1
    env_file:
      - ./config/codex-exec.env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - codex-home-v1:/codex-home
      - codex-state-v1:/state
      - ./config/schedules.yaml:/app/configs/schedules.yaml:ro
      - ./:/workspace

volumes:
  codex-home-v1:
  codex-state-v1:

networks:
  default:
    name: danta-bot-net
