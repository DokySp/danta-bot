services:
  telegram-gateway:
    container_name: telegram-gateway
    image: telegram-gateway:1.0.0
    user: "0:0"
    environment:
      GATEWAY_ROUTES_FILE: /app/config/routes.yaml
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8080
      HTTP_TIMEOUT: 10
      LOG_LEVEL: INFO
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped

networks:
  default:
    name: danta-bot-net
