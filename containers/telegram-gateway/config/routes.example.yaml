routes:
  # base worker through bot v1
  v1:
    env_file: /app/config/telegram-v1.env
    url: http://codex-exec:8080/telegram
    bot_commands:
      - command: new
        description: 새 Codex 세션 생성
        instruction: /new
      - command: usage
        description: Codex 사용량 확인
        instruction: /usage
      - command: kospi_touch_status
        description: KOSPI 터치 상태 확인
        instruction: /kospi_touch_status
      - command: add_portfolio_ticker
        description: 포트폴리오 종목 추가
        instruction: /add_portfolio_ticker
      - command: remove_portfolio_ticker
        description: 포트폴리오 종목 삭제
        instruction: /remove_portfolio_ticker
      - command: schedule_on
        description: 일일 거래 스케줄 활성화
        instruction: /schedule_on
      - command: schedule_off
        description: 일일 거래 스케줄 비활성화
        instruction: /schedule_off

  # experimental worker through bot v2
  v2:
    env_file: /app/config/telegram-v2.env
    url: http://codex-exec-experimental:8080/telegram
    bot_commands:
      - command: new
        description: 새 Codex 세션 생성
        instruction: /new
      - command: usage
        description: Codex 사용량 확인
        instruction: /usage
      - command: kospi_touch_status
        description: KOSPI 터치 상태 확인
        instruction: /kospi_touch_status
      - command: add_portfolio_ticker
        description: 포트폴리오 종목 추가
        instruction: /add_portfolio_ticker
      - command: remove_portfolio_ticker
        description: 포트폴리오 종목 삭제
        instruction: /remove_portfolio_ticker
      - command: schedule_on
        description: 일일 거래 스케줄 활성화
        instruction: /schedule_on
      - command: schedule_off
        description: 일일 거래 스케줄 비활성화
        instruction: /schedule_off
