name: codex-exec

services:
  codex-exec:
    container_name: codex-exec
    image: dokysp/codex-exec:latest
    environment:
      TELEGRAM_ROUTE: v1
    env_file:
      - ./config/codex-exec.env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - codex-home:/codex-home
      - codex-state:/state
      - ./config:/app/config:ro
      - ../../:/workspace

volumes:
  codex-home:
    name: codex-exec_codex-home
  codex-state:
    name: codex-exec_codex-state

networks:
  default:
    name: danta-bot-net
