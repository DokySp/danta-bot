schedules:
  - id: collect-financial-information
    enabled: true
    cron: "0 6 * * 1-5"
    message: |
      $check-portfolio로 설정 종목을 확인하고, 초기 계좌 스냅샷에서 현재 보유 종목을 읽어 둘을 합친 전체 종목 universe를 대상으로
      $collect-financial-information 수행하고 그 결과를 출력해줘.

  - id: trading-toggle
    enabled: true
    cron: "0 8 * * 1-5"
    message: |
      $check-holiday 스킬을 통해서 휴장일인지 확인하고, $trading-schedule-toggle 을 통해 휴장일이 아닌 경우 daily 스케줄을 활성화, 휴장일인 경우 daily 스케줄을 비활성화해줘.

  - id: daily-20
    enabled: true
    cron: "0 9,10,13 * * 1-5"
    message: |
      $check-portfolio로 설정 종목을 확인하고, 초기 계좌 스냅샷에서 현재 보유 종목을 읽어 둘을 합친 전체 종목 universe를 $daily-trading 대상으로 사용해줘.
      $daily-trading 스킬을 사용하여 현재 상황을 판단한 뒤, 실전(acct) 거래를 실제로 진행하고 거래 내역, 계좌 상태, 수익 상태를 요약해서 알려줘.

  - id: daily-30
    enabled: true
    cron: "0 15 * * 1-5"
    message: |
      $check-portfolio로 설정 종목을 확인하고, 초기 계좌 스냅샷에서 현재 보유 종목을 읽어 둘을 합친 전체 종목 universe를 $daily-trading 대상으로 사용해줘.
      $daily-trading 스킬을 사용하여 리밸런싱을 고려한 뒤, open일 때만 실전(acct) 거래를 실제로 진행하고 거래 내역, 계좌 상태, 수익 상태를 요약해서 알려줘.
