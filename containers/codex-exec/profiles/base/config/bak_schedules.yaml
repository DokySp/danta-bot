      $check-portfolio로 recommanded, specified, holding, universe JSON을 확인하고, check-portfolio의 universe를 $daily-trading 대상으로 사용해줘. $daily-trading에서는 universe 확장을 위해 현재 보유 종목을 별도로 다시 조회하지 마.
      $daily-trading 스킬을 사용하여 현재 상황을 판단한 뒤, 실전(acct) 거래를 실제로 진행하고 거래 내역, 계좌 상태, 수익 상태를 요약해서 알려줘.

  - id: daily-30
    enabled: true
    cron: "0 15 * * 1-5"
    message: |
      $check-portfolio로 recommanded, specified, holding, universe JSON을 확인하고, check-portfolio의 universe를 $daily-trading 대상으로 사용해줘. $daily-trading에서는 universe 확장을 위해 현재 보유 종목을 별도로 다시 조회하지 마.
      $daily-trading 스킬을 사용하여 리밸런싱을 고려한 뒤, open일 때만 실전(acct) 거래를 실제로 진행하고 거래 내역, 계좌 상태, 수익 상태를 요약해서 알려줘.


