schedules:
  - id: collect-financial-information
    enabled: true
    cron: "0 6 * * 1-5"
    message: |
      $check-portfolio로 recommanded, specified, holding, universe JSON을 확인하고, check-portfolio의 universe 전체 종목을 대상으로
      $collect-financial-information 수행하고 그 결과를 출력해줘.

  - id: pre-open
    enabled: true
    cron: "0 7 * * 1-5"
    message: |
      $check-portfolio로 recommanded, specified, holding, universe JSON을 확인하고, check-portfolio의 universe를 $daily-trading 대상으로 사용해줘. $daily-trading에서는 universe 확장을 위해 현재 보유 종목을 별도로 다시 조회하지 마.
      $daily-trading 스킬을 사용하여 실전(acct) 거래를 예약 거래로 실제 진행하고 거래 내역, 계좌 상태, 수익 상태를 요약해서 알려줘.

  - id: trading-toggle
    enabled: true
    cron: "0 8 * * 1-5"
    message: |
      $check-holiday 스킬을 통해서 휴장일인지 확인하고, $trading-schedule-toggle 을 통해 휴장일이 아닌 경우 daily 스케줄을 활성화, 휴장일인 경우 daily 스케줄을 비활성화해줘.

  - id: daily-11
    enabled: true
    cron: "5 9 * * 1-5"
    message: |
      $check-portfolio로 recommanded, specified, holding, universe JSON을 확인하고, check-portfolio의 universe를 $daily-trading 대상으로 사용해줘. $daily-trading에서는 universe 확장을 위해 현재 보유 종목을 별도로 다시 조회하지 마.
      $daily-trading 스킬을 사용하여 예약 거래 내역과 현재 상황을 판단한 뒤, 실전(acct) 거래를 실제로 진행하고 거래 내역, 계좌 상태, 수익 상태를 요약해서 알려줘.


  - id: daily-12
    enabled: true
    cron: "30 9 * * 1-5"
    message: |
      $check-portfolio로 recommanded, specified, holding, universe JSON을 확인하고, check-portfolio의 universe를 $daily-trading 대상으로 사용해줘. $daily-trading에서는 universe 확장을 위해 현재 보유 종목을 별도로 다시 조회하지 마.
      $daily-trading 스킬을 사용하여 예약 거래 내역과 현재 상황을 판단한 뒤, 실전(acct) 거래를 실제로 진행하고 거래 내역, 계좌 상태, 수익 상태를 요약해서 알려줘.


