services:
  codex-exec-stock-v1:
    container_name: codex-exec-stock-v1
    image: dokysp/codex-exec-v1:${CODEX_EXEC_V1_VERSION}
    environment:
      TELEGRAM_ROUTE: v1
    env_file:
      - ./codex-exec/config/codex-exec.env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - codex-home-stock-v1:/codex-home
      - codex-state-stock-v1:/state
      - ./codex-exec/config/schedules.yaml:/app/configs/schedules.yaml:ro
      - ./:/workspace

volumes:
  codex-home-stock-v1:
  codex-state-stock-v1:

networks:
  default:
    name: danta-bot-net
